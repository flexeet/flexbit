services:
  flexbit-backend:
    container_name: flexbit-backend
    build: .
    image: flexbit-backend:1.0.0
    env_file:
      - .env
    restart: unless-stopped
    cpus: 0.5
    mem_limit: 256m
    mem_reservation: 128m
    networks:
      - flexeet-network

networks:
  flexeet-network:
    external: true
